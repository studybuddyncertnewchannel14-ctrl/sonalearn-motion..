<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonaLearn-Motion | Studio Gate</title>
    <style>
        @import url('https://googleapis.com');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Inter', sans-serif; background-color: #000000; color: #ffffff; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        /* Translucent Moving Space Background */
        .bg-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.30; filter: blur(3px); z-index: 1; }
        
        .hero-box { position: relative; z-index: 2; text-align: center; max-width: 650px; padding: 40px; background: rgba(10, 10, 12, 0.7); border: 1px solid #1f1f23; border-radius: 28px; backdrop-filter: blur(10px); box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .brand-title { font-size: 52px; font-weight: 800; background: linear-gradient(135deg, #ffffff 40%, #818cf8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0 0 10px 0; letter-spacing: -1px; }
        .tagline { color: #9ca3af; font-size: 15px; margin-bottom: 35px; line-height: 1.5; font-weight: 500; }
        
        /* App Download Layout Pill */
        .pwa-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(99, 102, 241, 0.15); color: #818cf8; padding: 8px 16px; font-size: 12px; font-weight: 600; border-radius: 20px; border: 1px solid rgba(99, 102, 241, 0.3); margin-bottom: 25px; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .pwa-badge:hover { background: rgba(99, 102, 241, 0.25); }

        /* Menu Button Routing Channels */
        .menu-routes { display: flex; flex-direction: column; gap: 14px; }
        .cta-btn { display: block; background: #ffffff; color: #000000; border: none; padding: 16px; font-size: 16px; font-weight: 700; border-radius: 12px; text-decoration: none; transition: 0.2s; cursor: pointer; text-align: center; box-shadow: 0 4px 15px rgba(255,255,255,0.1); }
        .cta-btn:hover { background: #e5e7eb; transform: translateY(-1px); }
        .sub-btn { display: block; background: #111115; color: #9ca3af; border: 1px solid #1f1f23; padding: 14px; font-size: 14px; font-weight: 600; border-radius: 12px; text-decoration: none; transition: 0.2s; text-align: center; }
        .sub-btn:hover { border-color: #444; color: #fff; }
    </style>
</head>
<body>

    <!-- Space Background Stream -->
    <video class="bg-video" src="https://mixkit.co" autoplay loop muted playsinline></video>

    <div class="hero-box">
        <!-- Interactive App Download Pill Trigger -->
        <div id="pwaBtn" class="pwa-badge" style="display: none;">📲 Install Desktop / Mobile App</div>
        
        <h1 class="brand-title">SonaLearn-Motion</h1>
        <p class="tagline">The Premier Private AI Classroom Video Laboratory.<br>Engineered for high-fidelity educational content generation.</p>
        
        <div class="menu-routes">
            <a href="format-selector.html" class="cta-btn">Start Creating Visuals →</a>
            <a href="pricing.html" class="sub-btn">View Membership Plans & Milestone Unlocks</a>
        </div>
    </div>

    <!-- PWA Installation Script Module -->
    <script>
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('pwaBtn').style.display = 'inline-flex';
        });

        document.getElementById('pwaBtn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') { deferredPrompt = null; document.getElementById('pwaBtn').style.display = 'none'; }
            }
        });
    </script>
</body>
</html>
